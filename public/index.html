<!DOCTYPE html>
  
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Footy Predictor</title>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Geist:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0a;
  --surface: #111111;
  --surface2: #1a1a1a;
  --border: #2a2a2a;
  --ink: #f0f0f0;
  --ink-muted: #888;
  --ink-faint: #444;
  --green: #4ade80;
  --green-dim: #0f2a18;
  --radius: 10px;
}
body { font-family: 'Geist', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }

header {
border-bottom: 1px solid var(–border);
padding: 1.25rem 2rem;
display: flex;
align-items: center;
justify-content: space-between;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-ball {
width: 32px; height: 32px; border-radius: 50%;
background: var(–green); display: flex; align-items: center;
justify-content: center; font-size: 16px;
}
.logo-name { font-family: ‘Geist Mono’, monospace; font-size: 1rem; font-weight: 500; }
.logo-sub { font-size: 0.75rem; color: var(–ink-muted); }
.header-right { font-size: 0.78rem; color: var(–ink-faint); font-family: ‘Geist Mono’, monospace; }

.main { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

.page-title { font-size: 1.5rem; font-weight: 500; margin-bottom: 0.4rem; }
.page-sub { font-size: 0.9rem; color: var(–ink-muted); margin-bottom: 2rem; }

.tabs {
display: flex; gap: 4px; flex-wrap: wrap;
background: var(–surface); border: 1px solid var(–border);
border-radius: var(–radius); padding: 4px; margin-bottom: 1.5rem;
}
.tab {
padding: 7px 14px; border-radius: 7px; border: none;
background: transparent; color: var(–ink-muted);
font-family: ‘Geist’, sans-serif; font-size: 0.82rem;
cursor: pointer; transition: all 0.15s; white-space: nowrap;
display: flex; align-items: center; gap: 6px;
}
.tab:hover { color: var(–ink); background: var(–surface2); }
.tab.active { background: var(–surface2); color: var(–ink); border: 1px solid var(–border); }
.tab .count {
font-size: 0.7rem; font-family: ‘Geist Mono’, monospace;
background: var(–green-dim); color: var(–green);
padding: 1px 6px; border-radius: 20px;
}

.panel { display: none; }
.panel.active { display: block; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

.comp-header {
display: flex; align-items: center; gap: 12px;
margin-bottom: 1.25rem;
}
.comp-flag { font-size: 1.5rem; }
.comp-name { font-size: 1.1rem; font-weight: 500; }
.comp-country { font-size: 0.82rem; color: var(–ink-muted); }
.matchday-badge {
margin-left: auto; font-size: 0.75rem; font-family: ‘Geist Mono’, monospace;
background: var(–surface2); border: 1px solid var(–border);
padding: 4px 10px; border-radius: 20px; color: var(–ink-muted);
}

.fixtures { display: flex; flex-direction: column; gap: 8px; }

.fixture {
background: var(–surface);
border: 1px solid var(–border);
border-radius: var(–radius);
padding: 1rem 1.25rem;
display: grid;
grid-template-columns: 1fr auto 1fr;
align-items: center;
gap: 1rem;
transition: border-color 0.15s;
}
.fixture:hover { border-color: #3a3a3a; }

.team { font-size: 0.92rem; font-weight: 500; }
.team.home { text-align: right; }
.team.away { text-align: left; }

.match-info { text-align: center; }
.match-date {
font-family: ‘Geist Mono’, monospace; font-size: 0.75rem;
color: var(–ink-muted); display: block; margin-bottom: 3px;
}
.match-time {
font-family: ‘Geist Mono’, monospace; font-size: 0.88rem;
color: var(–green); font-weight: 500;
}
.vs { font-size: 0.72rem; color: var(–ink-faint); margin-top: 2px; }

.empty {
text-align: center; padding: 3rem;
color: var(–ink-muted); font-size: 0.9rem;
border: 1px dashed var(–border); border-radius: var(–radius);
}
.error-msg {
background: #2a0f0f; border: 1px solid #6e2a2a;
border-radius: var(–radius); padding: 1rem 1.25rem;
color: #ff7b72; font-size: 0.85rem; font-family: ‘Geist Mono’, monospace;
}

.loading {
text-align: center; padding: 4rem;
}
.spinner {
width: 32px; height: 32px;
border: 2px solid var(–border); border-top-color: var(–green);
border-radius: 50%; animation: spin 0.7s linear infinite;
margin: 0 auto 1rem;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading p { color: var(–ink-muted); font-family: ‘Geist Mono’, monospace; font-size: 0.85rem; }

.day1-badge {
display: inline-flex; align-items: center; gap: 6px;
font-size: 0.75rem; font-family: ‘Geist Mono’, monospace;
background: var(–green-dim); color: var(–green);
padding: 4px 10px; border-radius: 20px; margin-bottom: 1.5rem;
}
.day1-dot { width: 6px; height: 6px; border-radius: 50%; background: var(–green); animation: pulse 1.5s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>

</head>
<body>

<header>
  <div class="logo">
    <div class="logo-ball">⚽</div>
    <div>
      <div class="logo-name">footy-predictor</div>
      <div class="logo-sub">mini-league for your group</div>
    </div>
  </div>
  <nav style="display:flex;gap:1.25rem;align-items:center">
  <a href="/" style="font-size:0.82rem;color:#4ade80;text-decoration:none;font-family:'Geist Mono',monospace">fixtures</a>
  <a href="/predict.html" style="font-size:0.82rem;color:#888;text-decoration:none;font-family:'Geist Mono',monospace">predict</a>
  <a href="/leaderboard.html" style="font-size:0.82rem;color:#888;text-decoration:none;font-family:'Geist Mono',monospace">leaderboard</a>
  <a href="/profile.html" style="font-size:0.82rem;color:#888;text-decoration:none;font-family:'Geist Mono',monospace">profile</a>
</nav>
</header>

<div class="main">
  <div class="day1-badge"><div class="day1-dot"></div> day 1 · fixtures viewer</div>
  <div class="page-title">Upcoming fixtures</div>
  <div class="page-sub">Select a competition to see the next scheduled matches.</div>

  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p>Loading fixtures from all competitions...</p>
  </div>

  <div id="app" style="display:none">
    <div class="tabs" id="tabs"></div>
    <div id="panels"></div>
  </div>
</div>

<script>
const COMP_ORDER = ["PL", "PD", "SA", "BL1", "FL1", "CL"];

function formatDate(utcStr) {
  const d = new Date(utcStr);
  return d.toLocaleDateString("en-GB", { weekday: "short", day: "numeric", month: "short" });
}
function formatTime(utcStr) {
  const d = new Date(utcStr);
  return d.toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" });
}

function renderFixtures(code, data) {
  const { name, country, emoji, matches, error } = data;

  if (error) {
    return `<div class="error-msg">Could not load ${name}: ${error}</div>`;
  }
  if (!matches.length) {
    return `<div class="empty">No upcoming fixtures found for ${name}.</div>`;
  }

  const matchday = matches[0]?.matchday;
  const header = `
    <div class="comp-header">
      <span class="comp-flag">${emoji}</span>
      <div>
        <div class="comp-name">${name}</div>
        <div class="comp-country">${country}</div>
      </div>
      ${matchday ? `<span class="matchday-badge">Matchday ${matchday}</span>` : ""}
    </div>`;

  const fixtures = matches.map(m => `
    <div class="fixture">
      <div class="team home">${m.homeTeam}</div>
      <div class="match-info">
        <span class="match-date">${formatDate(m.utcDate)}</span>
        <span class="match-time">${formatTime(m.utcDate)}</span>
        <div class="vs">vs</div>
      </div>
      <div class="team away">${m.awayTeam}</div>
    </div>`).join("");

  return header + `<div class="fixtures">${fixtures}</div>`;
}

async function init() {
  try {
    const res = await fetch("/api/fixtures");
    const data = await res.json();

    if (data.error) {
      document.getElementById("loading").innerHTML =
        `<div class="error-msg">${data.error}</div>`;
      return;
    }

    const tabsEl = document.getElementById("tabs");
    const panelsEl = document.getElementById("panels");

    COMP_ORDER.forEach((code, i) => {
      const comp = data[code];
      if (!comp) return;

      const tab = document.createElement("button");
      tab.className = "tab" + (i === 0 ? " active" : "");
      tab.dataset.code = code;
      tab.innerHTML = `${comp.emoji} ${comp.name} <span class="count">${comp.matches?.length || 0}</span>`;
      tab.onclick = () => switchTab(code);
      tabsEl.appendChild(tab);

      const panel = document.createElement("div");
      panel.className = "panel" + (i === 0 ? " active" : "");
      panel.id = `panel-${code}`;
      panel.innerHTML = renderFixtures(code, comp);
      panelsEl.appendChild(panel);
    });

    document.getElementById("loading").style.display = "none";
    document.getElementById("app").style.display = "block";
    document.getElementById("last-updated").textContent =
      "updated " + new Date().toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" });

  } catch (e) {
    document.getElementById("loading").innerHTML =
      `<div class="error-msg">Network error — is the server running?</div>`;
  }
}

function switchTab(code) {
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.code === code));
  document.querySelectorAll(".panel").forEach(p => p.classList.toggle("active", p.id === `panel-${code}`));
}

init();
</script>

</body>
</html>
